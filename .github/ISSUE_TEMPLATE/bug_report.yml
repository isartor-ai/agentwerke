name: Bug report
description: Report a defect in Agentwerke
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please do **not** report security issues here —
        see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (and a workflow/BPMN snippet if relevant).
      placeholder: |
        1. Start the stack with ...
        2. Run workflow ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Agentwerke version/commit, runtime mode, model provider, OS, Docker version.
      placeholder: |
        - Agentwerke: commit abc1234
        - Runtime: Agentwerke (default) / Camunda
        - Model provider: mock / anthropic
        - OS / Docker: macOS 15, Docker 27
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / evidence
      description: Relevant API logs or an evidence-pack excerpt. Redact secrets.
      render: shell
    validations:
      required: false
