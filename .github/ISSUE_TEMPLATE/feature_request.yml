name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like Autofac to do. Sketch the API/BPMN/UI if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Workflow engine / BPMN
        - Agents / model providers
        - Tool Gateway / policy / sandbox
        - Connectors (GitHub, CI/CD, ...)
        - Web UI
        - Deployment / ops
        - Docs
        - Other
    validations:
      required: false
