name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Agentwerke.sln

      - name: Build
        run: dotnet build Agentwerke.sln --no-restore --configuration Release

      - name: Test
        # Exclude the E2E suite — it requires a running stack (Postgres + API +
        # docker sandbox) and is run via docker/docker-compose.e2e.yml, not unit CI.
        run: dotnet test Agentwerke.sln --no-build --configuration Release --filter "FullyQualifiedName!~Agentwerke.E2ETests" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
