name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs.autofac.de/**'
      - '.github/workflows/docs-pages.yml'
  pull_request:
    paths:
      - 'docs.autofac.de/**'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs.autofac.de/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs.autofac.de

      - name: Build docs
        run: npm run build
        working-directory: docs.autofac.de

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs.autofac.de/.vitepress/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
