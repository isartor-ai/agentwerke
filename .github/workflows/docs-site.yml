name: Deploy docs site

# Publishes the Agentwerke user manual (docs.agentwerke.de) to GitHub Pages.
# Path-filtered so it only runs when the manual content or its site tooling changes.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let an in-progress run finish so a live deploy isn't cancelled.
concurrency:
  group: docs-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install
        working-directory: docs
        run: npm ci
      - name: Build
        working-directory: docs
        run: npm run docs:build
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (Actions source) automatically so the first run doesn't fail
          # if Pages hasn't been turned on in Settings yet.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
