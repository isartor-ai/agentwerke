name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      # The committed package-lock.json is generated by npm 11; Node 20 ships
      # npm 10, which resolves the camunda/zeebe peer deps differently and makes
      # `npm ci` reject the lock. Pin npm to match the lockfile.
      - name: Pin npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
