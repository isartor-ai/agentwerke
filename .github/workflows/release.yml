name: Release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# Builds + tests, publishes container images to GHCR, and creates a GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)publish, e.g. v0.1.0"
        required: true

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to GHCR

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet restore Agentwerke.sln
      - run: dotnet build Agentwerke.sln --no-restore --configuration Release
      - run: dotnet test Agentwerke.sln --no-build --configuration Release

  images:
    name: Publish ${{ matrix.name }} image
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: docker/api/Dockerfile
            build_args: ""
          - name: web
            dockerfile: docker/web/Dockerfile
            # Published web image talks to the API via the nginx proxy (relative URLs)
            # and ships NO dev admin token.
            build_args: |
              VITE_API_BASE_URL=
          - name: agent-runner
            dockerfile: docker/agent-runner/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}

  release:
    name: GitHub Release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          body: |
            Container images (GHCR):
            - `ghcr.io/${{ github.repository }}/api`
            - `ghcr.io/${{ github.repository }}/web`
            - `ghcr.io/${{ github.repository }}/agent-runner`

            See [CHANGELOG.md](CHANGELOG.md) for notable changes.
