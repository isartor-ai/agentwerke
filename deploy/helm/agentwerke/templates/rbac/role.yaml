apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agentwerke.fullname" . }}-sandbox-executor
  namespace: {{ .Values.sandbox.namespace }}
  labels:
    {{- include "agentwerke.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete"]
