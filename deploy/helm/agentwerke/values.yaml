global:
  imageRegistry: ""
  imagePullSecrets: []

# --- API ---
api:
  image:
    repository: agentwerke/api
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
    className: nginx
    host: agentwerke.example.com
    tlsSecretName: agentwerke-tls
  env:
    ASPNETCORE_ENVIRONMENT: Production
    Tracing__ServiceName: agentwerke-api
    # Set Tracing__OtlpEndpoint to your OTLP collector, e.g. http://jaeger-collector:4317
    Tracing__OtlpEndpoint: ""
    # See the `sandbox` section below for the Sandboxes__* env vars merged in
    # by the agentwerke.sandboxEnv template.

# --- Worker (RunDispatchWorker) ---
worker:
  image:
    repository: agentwerke/api     # same image, different entrypoint via env
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  env:
    ASPNETCORE_ENVIRONMENT: Production
    Tracing__ServiceName: agentwerke-worker
    Tracing__OtlpEndpoint: ""
    # See the `sandbox` section below — this is the process that actually runs
    # AgentOrchestrator and dispatches sandboxed tasks.

# --- Web (SPA) ---
web:
  image:
    repository: agentwerke/web
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 1
  apiBaseUrl: "https://agentwerke.example.com/api"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 80

# --- Postgres ---
postgres:
  enabled: true           # set false to use an external DB
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  storage:
    size: 20Gi
    storageClass: ""
  credentials:
    existingSecret: ""    # name of K8s Secret with POSTGRES_PASSWORD key
    database: agentwerke
    username: postgres

# --- Shared secrets reference ---
# Create a K8s Secret named `agentwerke-secrets` with keys:
#   POSTGRES_PASSWORD, ANTHROPIC_API_KEY, JWT_SECRET, OPEN_SANDBOX_API_KEY (optional)
secretName: agentwerke-secrets

# --- Sandbox execution ---
#
# See docs/decisions/ADR-003-use-opensandbox-control-plane-with-kata-runtime.md
# and docs/manual-test-opensandbox.md for the full rollout plan.
#
# Production should set provider to "opensandbox" and point openSandbox.serverUrl
# at an OpenSandbox server deployed in Kubernetes mode with a Kata (or
# Kata+Firecracker) RuntimeClass configured on its sandbox pods. Agentwerke does
# not deploy OpenSandbox itself or create sandbox pods directly in this mode —
# it is a client of the OpenSandbox server's REST API. Deploy OpenSandbox with
# its own chart/manifests per https://github.com/opensandbox-group/OpenSandbox.
#
# Leaving provider at "docker" in production talks to whatever Docker socket
# the worker pod can reach, which is not a meaningful production isolation
# boundary — it exists for local development only.
sandbox:
  provider: opensandbox   # docker | opensandbox | kubernetes-kata (kubernetes-kata is reserved, not yet implemented)

  openSandbox:
    enabled: true
    serverUrl: ""           # REQUIRED for provider=opensandbox, e.g. http://opensandbox.opensandbox.svc.cluster.local:8080/v1
    useServerProxy: true    # true when the OpenSandbox server itself runs in-cluster
    defaultImage: "alpine:3.19"
    defaultTimeoutSeconds: 60
    readinessTimeoutSeconds: 30
    # API key is read from `secretName` (key: OPEN_SANDBOX_API_KEY) when set.

  # Namespace + RBAC for the reserved direct Kubernetes/Kata executor
  # (Agentwerke.Sandboxes.KubernetesKataSandboxExecutor). This internal class keeps
  # the legacy namespace until the deferred technical namespace migration.
  # This is the fallback architecture only if the OpenSandbox spike fails — see ADR-003. It is not
  # used while provider is "opensandbox" or "docker".
  namespace: agentwerke-sandboxes
  createNamespace: true
