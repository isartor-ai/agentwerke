###############################################################################
# Autofac E2E test stack
#
# The profiles include one-shot migration services. Avoid `up
# --abort-on-container-exit` for the full stack because Compose will stop when
# migration exits successfully. Use dedicated runner scripts or a two-phase flow
# (bring dependencies up, then run the test container).
#
# OpenSandbox profile (local OpenSandbox server + real agent sandbox execution):
#   scripts/run-opensandbox-e2e.sh
#
# What gets mocked
# ----------------
# • GitHub API  → WireMock (catch-all 200), so no real PAT is needed.
# • Agent LLM   → Sandbox is disabled; AgentOrchestrator falls back to the
#                  no-op skill path that returns success immediately.
# • OpenSandbox → Not mocked in the opensandbox profile. The API talks to a
#                  local OpenSandbox server that uses the host Docker daemon.
###############################################################################

services:

  # ── Shared infrastructure (always started) ──────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autofac_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autofac_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
      target: build
    working_dir: /repo
    command: >
      dotnet ef database update
      --project src/Autofac.Infrastructure/Autofac.Infrastructure.csproj
      --startup-project src/Autofac.Api/Autofac.Api.csproj
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=autofac_e2e;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # WireMock — stubs external HTTP calls so tests need no real credentials.
  # Mapping file: tests/Autofac.E2ETests/Fixtures/wiremock-github-stub.json
  wiremock:
    image: wiremock/wiremock:3.10.0
    command: --port 8080
    # Published so containers the agent-sandboxed sandbox provider creates can
    # reach it via host.docker.internal:9093 — those containers land on Docker's
    # plain "bridge" network (see DockerSandboxExecutor.ResolveNetworkMode), not
    # this compose-managed network, so the "wiremock" service name doesn't
    # resolve there.
    ports:
      - "9093:8080"
    volumes:
      - ../tests/Autofac.E2ETests/Fixtures/wiremock-github-stub.json:/home/wiremock/mappings/github.json:ro
      - ../tests/Autofac.E2ETests/Fixtures/wiremock-anthropic-stub.json:/home/wiremock/mappings/anthropic.json:ro
      - ../tests/Autofac.E2ETests/Fixtures/wiremock-anthropic-tool-use-stub.json:/home/wiremock/mappings/anthropic-tool-use.json:ro
    healthcheck:
      # WireMock 3.10+ admin endpoint returns {"status":"healthy"}
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/__admin/health | grep -q healthy"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── OpenSandbox E2E infrastructure ─────────────────────────────────────────

  postgres-opensandbox:
    profiles: [opensandbox]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autofac_e2e_opensandbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_opensandbox_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autofac_e2e_opensandbox"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate-opensandbox:
    profiles: [opensandbox]
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
      target: build
    working_dir: /repo
    command: >
      dotnet ef database update
      --project src/Autofac.Infrastructure/Autofac.Infrastructure.csproj
      --startup-project src/Autofac.Api/Autofac.Api.csproj
    environment:
      ConnectionStrings__Postgres: "Host=postgres-opensandbox;Port=5432;Database=autofac_e2e_opensandbox;Username=postgres;Password=postgres"
    depends_on:
      postgres-opensandbox:
        condition: service_healthy
    restart: "no"

  opensandbox:
    profiles: [opensandbox]
    build:
      context: ..
      dockerfile: docker/opensandbox/Dockerfile
      args:
        OPENSANDBOX_SERVER_VERSION: "${OPENSANDBOX_SERVER_VERSION:-}"
    environment:
      OPENSANDBOX_INSECURE_SERVER: "YES"
      SANDBOX_CONFIG_PATH: "/etc/opensandbox/sandbox.toml"
    ports:
      - "8089:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - opensandbox_data:/var/lib/opensandbox
    # sandbox.toml pins [docker] network_mode = "bridge" because OpenSandbox's
    # egress sidecar enforcement rejects any other network_mode. The sandboxes
    # and egress sidecars this server creates via the mounted Docker socket
    # land on Docker's literal "bridge" network, so this container also needs
    # to be reachable there. Compose can't declare that attachment itself —
    # Docker's daemon rejects network-scoped aliases on non-user-defined
    # networks — so scripts/run-opensandbox-e2e.sh runs
    # `docker network connect bridge <container>` imperatively after this
    # container starts.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2).read()\""]
      interval: 5s
      timeout: 5s
      start_period: 20s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=autofac_e2e;Username=postgres;Password=postgres"
      Storage__RootPath: /app/storage
      Agents__Skills__SkillsDirectory: ""
      Sandboxes__Docker__Enabled: "false"
      # Agent steps run in-process (executionMode "local"), so the API itself calls the
      # Anthropic Messages API — routed to the shared WireMock stub via the in-network service
      # name (the API is on the compose network). ApiKey just needs to be non-empty so the real
      # client (not the Null client) is wired. Without this, agent service tasks fail with
      # "No language model client is configured" and WorkflowRunTests go red.
      Anthropic__ApiKey: "test-key"
      Anthropic__ApiBaseUrl: "http://wiremock:8080/"
      # Route GitHub API calls through WireMock — no real token needed
      Integrations__GitHub__ApiBaseUrl: "http://wiremock:8080/"
      Integrations__GitHub__PersonalAccessToken: "mock-token"
      Integrations__GitHub__RepositoryOwner: "mock-owner"
      Integrations__GitHub__RepositoryName: "mock-repo"
      Integrations__Jira__WebhookSecret: ""
      Integrations__GitHub__WebhookSecret: ""
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      wiremock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  api-opensandbox:
    profiles: [opensandbox]
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    ports:
      - "8083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres-opensandbox;Port=5432;Database=autofac_e2e_opensandbox;Username=postgres;Password=postgres"
      Storage__RootPath: /app/storage
      Agents__Registry__AgentsDirectory: /app/agents
      Agents__Skills__SkillsDirectory: ""
      Sandboxes__Enabled: "true"
      Sandboxes__Provider: "opensandbox"
      Sandboxes__OpenSandbox__Enabled: "true"
      Sandboxes__OpenSandbox__BaseUrl: "http://opensandbox:8080/v1"
      Sandboxes__OpenSandbox__ServerUrl: "http://opensandbox:8080/v1"
      Sandboxes__OpenSandbox__DefaultImage: "alpine:3.19"
      Sandboxes__OpenSandbox__DefaultTimeoutSeconds: "60"
      Sandboxes__OpenSandbox__ReadinessTimeoutSeconds: "60"
      # use_server_proxy=true routes execd traffic through the opensandbox
      # server, but its proxy mis-frames the execd SSE stream's response
      # headers (observed: an immediate "Cannot write more bytes to the
      # buffer than the configured maximum buffer size" failure on the very
      # first read — looks like a bogus declared content length on the
      # proxied response, not something fixable from the client side).
      # Going direct avoids the proxy entirely; scripts/run-opensandbox-e2e.sh
      # attaches this container to Docker's literal "bridge" network (where
      # sandbox containers land, see sandbox.toml [docker] network_mode) so
      # the direct connection is actually reachable.
      Sandboxes__OpenSandbox__UseServerProxy: "false"
      Sandboxes__OpenSandbox__WorkingDirectory: "/workspace"
      Integrations__GitHub__ApiBaseUrl: "http://wiremock:8080/"
      Integrations__GitHub__PersonalAccessToken: "mock-token"
      Integrations__GitHub__RepositoryOwner: "mock-owner"
      Integrations__GitHub__RepositoryName: "mock-repo"
      Integrations__Jira__WebhookSecret: ""
      Integrations__GitHub__WebhookSecret: ""
      Jwt__DevIdentityEnabled: "true"
      Jwt__DevIdentitySubject: "dev:admin"
      Jwt__DevIdentityRoles__0: "Admin"
    volumes:
      - opensandbox_api_storage:/app/storage
      - opensandbox_agents:/app/agents
    depends_on:
      postgres-opensandbox:
        condition: service_healthy
      migrate-opensandbox:
        condition: service_completed_successfully
      wiremock:
        condition: service_healthy
      opensandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── Core E2E tests (built-in BPMN engine) ───────────────────────────────────

  e2e-tests:
    profiles: [core]
    build:
      context: ..
      dockerfile: docker/e2e/Dockerfile
    environment:
      AUTOFAC_API_URL: "http://api:8080"
      CAMUNDA_ENABLED: "false"
    depends_on:
      api:
        condition: service_healthy

  # ── OpenSandbox-backed agent execution E2E ─────────────────────────────────

  e2e-tests-opensandbox:
    profiles: [opensandbox]
    build:
      context: ..
      dockerfile: docker/e2e/Dockerfile
    command: ["--filter", "FullyQualifiedName~OpenSandboxWorkflowE2ETests"]
    environment:
      AUTOFAC_API_URL: "http://api-opensandbox:8080"
      AUTOFAC_OPEN_SANDBOX_E2E: "true"
      CAMUNDA_ENABLED: "false"
    depends_on:
      api-opensandbox:
        condition: service_healthy

  # ── agent_sandboxed E2E infrastructure ───────────────────────────────────────
  #
  # Exercises the real OpenSandboxedAgentRunner path (a claude-code-runner agent
  # running Autofac.AgentRunner.dll inside a real container) via the local Docker
  # sandbox provider, not OpenSandbox — see docs/manual-test-opensandbox.md for why.
  # The Anthropic Messages API is stubbed through the shared wiremock service so no
  # real model API key is needed.

  postgres-agent-sandboxed:
    profiles: [agent-sandboxed]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autofac_e2e_agent_sandboxed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_agent_sandboxed_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autofac_e2e_agent_sandboxed"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate-agent-sandboxed:
    profiles: [agent-sandboxed]
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
      target: build
    working_dir: /repo
    command: >
      dotnet ef database update
      --project src/Autofac.Infrastructure/Autofac.Infrastructure.csproj
      --startup-project src/Autofac.Api/Autofac.Api.csproj
    environment:
      ConnectionStrings__Postgres: "Host=postgres-agent-sandboxed;Port=5432;Database=autofac_e2e_agent_sandboxed;Username=postgres;Password=postgres"
    depends_on:
      postgres-agent-sandboxed:
        condition: service_healthy
    restart: "no"

  # Builds and tags the image OpenSandboxedAgentRunner runs inside the sandbox
  # container (Sandboxes__OpenSandbox__AgentRunnerImage below). Never started —
  # scripts/run-agent-sandboxed-e2e.sh only `build`s it so the tagged image
  # exists locally before any run executes.
  agent-runner-image:
    profiles: [agent-sandboxed]
    build:
      context: ..
      dockerfile: docker/agent-runner/Dockerfile
    image: autofac-agent-runner:e2e

  api-agent-sandboxed:
    profiles: [agent-sandboxed]
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    ports:
      - "8085:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres-agent-sandboxed;Port=5432;Database=autofac_e2e_agent_sandboxed;Username=postgres;Password=postgres"
      Storage__RootPath: /app/storage
      Agents__Skills__SkillsDirectory: ""
      Sandboxes__Enabled: "true"
      Sandboxes__Provider: "docker"
      Sandboxes__Docker__Enabled: "true"
      Sandboxes__Docker__DockerEndpoint: "unix:///var/run/docker.sock"
      # api-agent-sandboxed talks to the host's Docker daemon over the mounted socket
      # (Docker-outside-of-Docker), so any bind-mount source it hands the daemon — like
      # the artifacts dir DockerSandboxExecutor mounts into each sandbox container — is
      # resolved by the daemon against the *host* filesystem, not this container's. The
      # default (Path.GetTempPath(), i.e. this container's own /tmp) would silently
      # resolve to an unrelated, empty directory on the host. Pointing it at a path
      # that's bind-mounted here under that exact same absolute path (see volumes
      # below) makes both sides agree on one real directory.
      Sandboxes__Docker__ArtifactsHostPath: "${PWD}/docker/.agent-sandboxed-artifacts"
      Sandboxes__OpenSandbox__AgentRunnerImage: "autofac-agent-runner:e2e"
      # The Anthropic Messages API is stubbed by the shared wiremock service (see
      # tests/Autofac.E2ETests/Fixtures/wiremock-anthropic-stub.json) — ApiKey just
      # needs to be non-empty for the runner's "is a credential configured" check.
      # This value is forwarded verbatim into the sandbox container as
      # AUTOFAC_MODEL_API_BASE_URL, so it must resolve from there too — hence
      # host.docker.internal:9093 (wiremock's published port), not the
      # compose-network service name "wiremock" (see the wiremock service comment).
      Anthropic__ApiKey: "test-key"
      Anthropic__ApiBaseUrl: "http://host.docker.internal:9093"
      Integrations__GitHub__ApiBaseUrl: "http://wiremock:8080/"
      Integrations__GitHub__PersonalAccessToken: "mock-token"
      Integrations__GitHub__RepositoryOwner: "mock-owner"
      Integrations__GitHub__RepositoryName: "mock-repo"
      Integrations__Jira__WebhookSecret: ""
      Integrations__GitHub__WebhookSecret: ""
      Jwt__DevIdentityEnabled: "true"
      Jwt__DevIdentitySubject: "dev:admin"
      Jwt__DevIdentityRoles__0: "Admin"
    volumes:
      - agent_sandboxed_api_storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/docker/.agent-sandboxed-artifacts:${PWD}/docker/.agent-sandboxed-artifacts
    depends_on:
      postgres-agent-sandboxed:
        condition: service_healthy
      migrate-agent-sandboxed:
        condition: service_completed_successfully
      wiremock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  e2e-tests-agent-sandboxed:
    profiles: [agent-sandboxed]
    build:
      context: ..
      dockerfile: docker/e2e/Dockerfile
    command: ["--filter", "FullyQualifiedName~AgentSandboxedWorkflowE2ETests"]
    environment:
      AUTOFAC_API_URL: "http://api-agent-sandboxed:8080"
      AUTOFAC_AGENT_SANDBOXED_E2E: "true"
      CAMUNDA_ENABLED: "false"
    depends_on:
      api-agent-sandboxed:
        condition: service_healthy

  # ── Camunda 8 spike (issue #69) ─────────────────────────────────────────────
  #
  # Zeebe 8.6 self-managed, no Elasticsearch/Operate.
  # The REST gateway (port 8088) is used by the spike tests to verify:
  #   1. The topology endpoint responds → Zeebe is reachable
  #   2. A BPMN process can be submitted for deployment
  #
  # The autofac-specific extension elements in e2e-simple.bpmn are expected to
  # be rejected by Zeebe (400) — that is an acceptable spike result and proves
  # the gateway is reachable. A real integration would strip/translate the
  # autofac:agentTask extensions before deploying to Zeebe.
  #
  # Memory: Zeebe needs ~1 GB; set Docker Desktop to ≥ 3 GB.

  zeebe:
    profiles: [camunda]
    image: camunda/zeebe:8.6.6
    environment:
      # Remove the default Elasticsearch exporter that camunda/zeebe ships with.
      # Setting ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME= (empty string) causes
      # ClassNotFoundException; replacing the exporters map via SPRING_APPLICATION_JSON avoids that.
      # The REST API (/v2/topology etc.) is served by Zeebe's Tomcat on port 8080 by default
      # (same server as the actuator) — no extra config needed to enable it.
      - >-
        SPRING_APPLICATION_JSON={"zeebe":{"broker":{"exporters":{}}}}
    ports:
      - "26500:26500"   # gRPC gateway
      - "8088:8080"     # REST API (Zeebe internal port 8080 exposed on host as 8088 for spike tests)
    healthcheck:
      # camunda/zeebe has no curl/wget. Check that the monitoring port 9600
      # (0x2580 hex) is in LISTEN state in /proc/net/tcp6 — this comes up
      # only after the broker transitions to LEADER.
      test: ["CMD-SHELL", "grep -q ':2580 ' /proc/net/tcp6"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20

  e2e-tests-camunda:
    profiles: [camunda]
    build:
      context: ..
      dockerfile: docker/e2e/Dockerfile
    environment:
      AUTOFAC_API_URL: "http://api:8080"
      CAMUNDA_ENABLED: "true"
      ZEEBE_REST_URL: "http://zeebe:8080"
    depends_on:
      api:
        condition: service_healthy
      zeebe:
        condition: service_healthy

volumes:
  postgres_opensandbox_data:
  opensandbox_api_storage:
  opensandbox_agents:
  opensandbox_data:
  postgres_agent_sandboxed_data:
  agent_sandboxed_api_storage:

networks:
  # Pinned (not auto-derived from the cwd basename) purely for a stable, predictable
  # network name across checkouts; service-to-service DNS (e.g. api-opensandbox ->
  # opensandbox) works the same as compose's auto-named default network.
  default:
    name: autofac-e2e-default
