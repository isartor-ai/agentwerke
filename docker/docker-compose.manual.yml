###############################################################################
# Agentwerke — Manual test stack
#
# Brings up: Postgres, API, Web UI, and WireMock (GitHub stub).
# Optional `camunda` profile adds a local Camunda 8 Zeebe runtime for
# development and evaluation. The Camunda Docker Compose path is intended for
# local development, not production.
#
# No real credentials needed. Agent tasks use simulated output.
#
# Start:
#   docker compose -f docker/docker-compose.manual.yml up --build
#   docker compose -f docker/docker-compose.manual.yml --profile camunda up --build
#
# Stop and remove volumes:
#   docker compose -f docker/docker-compose.manual.yml down -v
#
# Ports:
#   http://localhost:3002   Web UI
#   http://localhost:8081   API  (e.g. http://localhost:8081/api/health/live)
#   http://localhost:9090   WireMock admin (optional inspection)
#   http://localhost:8088   Camunda Zeebe REST topology endpoint (`/v2/topology`) when `--profile camunda` is enabled
#   http://localhost:9600   Camunda Zeebe readiness endpoint (`/ready`) when `--profile camunda` is enabled
#
# Auth:
#   The API is configured with a dev-only JWT secret. The web UI is built with
#   a pre-signed admin token (VITE_DEV_ADMIN_TOKEN) so all protected endpoints
#   work without a login flow. DO NOT use these credentials in production.
###############################################################################

services:

  # Optional Camunda 8 self-managed orchestration runtime for local development.
  # This keeps the manual stack compatible with the future Camunda-backed engine
  # work without changing the default no-Camunda workflow.
  zeebe:
    profiles: [camunda]
    image: camunda/zeebe:8.6.6
    environment:
      # Disable the default Elasticsearch exporter for the lightweight local profile.
      - >-
        SPRING_APPLICATION_JSON={"zeebe":{"broker":{"exporters":{}}}}
    ports:
      - "26500:26500"
      - "8088:8080"
      - "9600:9600"
    healthcheck:
      # The broker monitoring API listens on port 9600 once the node is ready.
      # The image does not ship curl/wget reliably, so we probe the listening
      # socket directly instead of calling /ready from inside the container.
      test: ["CMD-SHELL", "grep -q ':2580 ' /proc/net/tcp6 || grep -q ':2580 ' /proc/net/tcp"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentwerke_manual
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentwerke_manual"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
      target: build
    working_dir: /repo
    command: >
      dotnet ef database update
      --project src/Agentwerke.Infrastructure/Agentwerke.Infrastructure.csproj
      --startup-project src/Agentwerke.Api/Agentwerke.Api.csproj
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=agentwerke_manual;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # WireMock stubs GitHub API calls so no real PAT is required.
  # Admin UI: http://localhost:9090/__admin/mappings
  wiremock:
    image: wiremock/wiremock:3.10.0
    command: --port 8080
    ports:
      - "9090:8080"
    volumes:
      - ../tests/Agentwerke.E2ETests/Fixtures/wiremock-github-stub.json:/home/wiremock/mappings/github.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/__admin/health | grep -q healthy"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=agentwerke_manual;Username=postgres;Password=postgres"
      Storage__RootPath: /app/storage
      # Skills directory empty → agent tasks run as simulated no-op (succeed immediately)
      Agents__Skills__SkillsDirectory: ""
      # Docker sandbox disabled → service tasks complete with simulated output, no containers spawned
      Sandboxes__Docker__Enabled: "false"
      # Route GitHub API calls through WireMock — no real token needed
      Integrations__GitHub__ApiBaseUrl: "http://wiremock:8080/"
      Integrations__GitHub__PersonalAccessToken: "mock-token"
      Integrations__GitHub__RepositoryOwner: "mock-owner"
      Integrations__GitHub__RepositoryName: "mock-repo"
      Integrations__Jira__WebhookSecret: ""
      Integrations__GitHub__WebhookSecret: ""
      # Dev-only JWT — signs tokens accepted by the web UI's pre-baked admin token.
      # Secret must match VITE_DEV_ADMIN_TOKEN in the web service build args.
      Jwt__SecretKey: "agentwerke-dev-manual-testing-key-2026"
      Jwt__Issuer: "agentwerke-dev"
      Jwt__Audience: "agentwerke-dev"
      Jwt__DevTokensEnabled: "true"
    volumes:
      - api_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      wiremock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Seeds demo data (workflow, completed run, awaiting-approval run) after migrations.
  seed:
    image: postgres:16-alpine
    # --set ON_ERROR_STOP=1 so a bad SQL statement fails loudly instead of silently
    command: >
      psql --set ON_ERROR_STOP=1
      "host=postgres port=5432 dbname=agentwerke_manual user=postgres password=postgres"
      -f /seed/seed-manual.sql
    volumes:
      - ./seed-manual.sql:/seed/seed-manual.sql:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
        # Pre-signed HS256 JWT (role=admin, exp=2030-01-01, signed with Jwt__SecretKey above).
        # Allows the SPA to call protected endpoints without a login flow.
        # role=Admin (PascalCase) to match backend RequireRole policy checks.
        VITE_DEV_ADMIN_TOKEN: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..ICCK9WVptCdU81iugfkBGyW5yPM9QAyxOYVtYStnjb0"
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  api_storage:
