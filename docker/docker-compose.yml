services:

  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentwerke
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentwerke"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
      target: build        # uses the SDK stage — dotnet-ef already restored
    working_dir: /repo
    command: dotnet ef database update
      --project src/Autofac.Infrastructure/Autofac.Infrastructure.csproj
      --startup-project src/Autofac.Api/Autofac.Api.csproj
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=agentwerke;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    image: postgres:16-alpine
    command: >
      psql -h postgres -U postgres -d agentwerke
      -v ON_ERROR_STOP=1
      -f /seed/seed-first-run.sql
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./seed-first-run.sql:/seed/seed-first-run.sql:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=agentwerke;Username=postgres;Password=postgres"
      Storage__RootPath: /app/storage
      Agents__Skills__SkillsDirectory: /app/skills
      Agents__Registry__AgentsDirectory: /app/agents
      Agents__Registry__WritableAgentsDirectory: /app/storage/agents
      Sandboxes__Docker__Enabled: "false"
      Sandboxes__Docker__DockerEndpoint: "unix:///var/run/docker.sock"
      Tracing__OtlpEndpoint: "http://jaeger:4317"
      Tracing__ServiceName: "agentwerke-api"
    volumes:
      - api_storage:/app/storage
      - ../.github/skills:/app/skills:ro
      - ../agents:/app/agents:ro
      # Uncomment to enable Docker sandbox (also set Sandboxes__Docker__Enabled=true above):
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      jaeger:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
      args:
        # Point the SPA at the nginx proxy path (empty = relative URLs handled by nginx)
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - api

volumes:
  postgres_data:
  api_storage:
